name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.44.1"

jobs:
  android-artifacts:
    name: Build APK & App Bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate sources
        run: bash ../scripts/gen.sh

      - name: Verify CI signing keystore
        run: |
          test -f android/app/fridgeos-ci.jks
          echo "Using committed fridgeos-ci.jks for release signing (stable updates)."

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (release)
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fridgeos-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: fridgeos-aab
          path: flutter_app/build/app/outputs/bundle/release/app-release.aab
