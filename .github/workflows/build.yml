name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.44.1"

jobs:
  android-artifacts:
    name: Build APK & App Bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate sources
        run: bash ../scripts/gen.sh

      - name: Configure stable CI signing
        run: |
          test -f android/app/fridgeos-ci.jks
          # Explicit key.properties so Gradle never falls back to debug signing.
          cp android/key.properties.ci android/key.properties
          # On CI, build.gradle.kts still prefers fridgeos-ci.jks via GITHUB_ACTIONS.
          echo "Configured stable FridgeOS CI signing keystore."

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (release)
        run: flutter build appbundle --release

      - name: Verify APK signature certificate
        run: |
          set -euo pipefail
          APK=build/app/outputs/flutter-apk/app-release.apk
          test -f "$APK"

          # Normalize fingerprints: strip separators, uppercase hex.
          # keytool prints "AA:BB:…"; apksigner prints "aabb…" without colons.
          normalize_fp() {
            tr -d '[:space:]:' | tr '[:lower:]' '[:upper:]'
          }

          EXPECTED=$(keytool -list -v \
            -keystore android/app/fridgeos-ci.jks \
            -storepass fridgeos-ci-store \
            -alias fridgeos \
            | sed -n 's/^[[:space:]]*SHA256:[[:space:]]*//p' \
            | head -n 1 \
            | normalize_fp)
          if [ -z "$EXPECTED" ]; then
            echo "::error::Failed to read SHA256 from android/app/fridgeos-ci.jks"
            exit 1
          fi

          # Resolve apksigner from the Android SDK (rarely on PATH on Actions runners).
          APKSIGNER=""
          if command -v apksigner >/dev/null 2>&1; then
            APKSIGNER=$(command -v apksigner)
          else
            SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
            if [ -n "$SDK_ROOT" ] && [ -d "$SDK_ROOT/build-tools" ]; then
              APKSIGNER=$(ls -1 "$SDK_ROOT"/build-tools/*/apksigner 2>/dev/null | sort -V | tail -n 1 || true)
            fi
          fi

          ACTUAL=""
          if [ -n "${APKSIGNER}" ] && [ -x "${APKSIGNER}" ]; then
            echo "Using apksigner: $APKSIGNER"
            CERTS=$("$APKSIGNER" verify --print-certs "$APK")
            printf '%s\n' "$CERTS"
            ACTUAL=$(printf '%s\n' "$CERTS" \
              | sed -n 's/.*certificate SHA-256 digest:[[:space:]]*//p' \
              | head -n 1 \
              | normalize_fp)
          else
            echo "apksigner not found; falling back to META-INF jar signature"
            TMP=$(mktemp -d)
            unzip -qo "$APK" -d "$TMP" 'META-INF/*' || true
            CERT=$(find "$TMP/META-INF" -type f \( -name '*.RSA' -o -name '*.DSA' -o -name '*.EC' \) 2>/dev/null | head -n 1 || true)
            if [ -z "${CERT}" ]; then
              echo "::error::No META-INF signing cert in APK and apksigner unavailable."
              ls -la "$TMP/META-INF" 2>/dev/null || true
              rm -rf "$TMP"
              exit 1
            fi
            ACTUAL=$(keytool -printcert -file "$CERT" \
              | sed -n 's/^[[:space:]]*SHA256:[[:space:]]*//p' \
              | head -n 1 \
              | normalize_fp)
            rm -rf "$TMP"
          fi

          echo "Expected SHA256: $EXPECTED"
          echo "APK SHA256:      $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "::error::Failed to extract signing certificate SHA256 from APK"
            exit 1
          fi
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::APK signing certificate does not match fridgeos-ci.jks"
            echo "This usually means the release build fell back to the debug keystore."
            exit 1
          fi
          echo "APK signing certificate matches fridgeos-ci.jks — updates will install in place."

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fridgeos-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: fridgeos-aab
          path: flutter_app/build/app/outputs/bundle/release/app-release.aab
