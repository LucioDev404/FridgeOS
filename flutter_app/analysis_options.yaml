# Static analysis configuration (see docs/03-non-functional-requirements.md
# NFR-MAINT-1). CI runs `flutter analyze` and fails on any issue.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat missing awaits and dead code as errors, not warnings.
    unawaited_futures: error
    dead_code: error
  exclude:
    # Generated sources are excluded from analysis; they are verified by their
    # generators and by compilation.
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/l10n/gen/**"

linter:
  rules:
    - always_declare_return_types
    - avoid_dynamic_calls
    - avoid_print
    - directives_ordering
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_locals
    - require_trailing_commas
    - unawaited_futures
    - use_super_parameters
